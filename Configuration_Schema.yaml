framework:
  name: ExecutiveAudit
  version: "1.0"
  schema: "experiment.schema.v1"

experiment:
  id: stroop_standard_v1
  name: Standard Stroop Benchmark
  description: >
    Baseline executive-control benchmark using the
    standard Stroop interference task.
  author: ""
  created: ""
  tags:
    - executive-control
    - stroop
    - baseline

hypothesis:
  id: H1
  mechanism: task_set_decay
  intervention: none
  baseline: true

runtime:
  repetitions: 20
  random_seed: 42
  timeout_seconds: 60
  parallel_runs: 1
  cache_results: true
  save_raw_output: true

task:
  id: stroop_standard
  version: "1.0"
  enabled: true
  package: tasks/stroop_standard

model:
  provider: openai
  adapter: openai
  name: gpt-5.5
  api:
    temperature: 0.0
    max_tokens: 1024

adapter:
  retry_count: 3
  retry_delay_seconds: 5
  rate_limit: auto

parser:
  pipeline:
    - default

metrics:
  pipeline:
    - accuracy
    - response_time
    - omitted_items

output:
  directory: reports/
  overwrite: false
  save_raw: true

report:
  formats:
    - json
    - html

logging:
  level: INFO
  save_log: true

validation:
  strict_mode: true
  stop_on_error: true

environment:
  mode: production
  cache: true
  offline: false

extensions:
  enabled: []
  configuration: {}

metadata: {}