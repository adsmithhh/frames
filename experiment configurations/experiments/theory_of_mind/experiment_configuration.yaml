framework:
  name: ExecutiveAudit
  configuration_schema: experiment_configuration.v2
  configuration_version: '2.0'
  payload_schema: task_payload.v2
  payload_version: '2.0'

run:
  id: theory_of_mind_experiment_run
  label: Theory of Mind False Belief Experiment
  description: >
    DeepSeek configuration for theory of mind false belief task testing mental state attribution.
  mode: production

experiment_binding:
  payload_file: task_payload.yaml
  fail_on_payload_mismatch: false

task:
  payload_file: task_payload.yaml

model:
  adapter: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  generation:
    temperature: 0.0
    max_tokens: 15
    top_p: null
    stop_sequences: []
  request:
    timeout_seconds: 60
    retry_count: 2
    retry_delay_seconds: 3
    rate_limit: auto

execution:
  repetitions: 20
  random_seed: 42
  timeout_seconds: 60
  parallel_runs: 1
  stop_after_trials: 5
  shuffle_trials: false
  fail_fast: true
  save_raw_output: true

report:
  output_directory: reports/
  overwrite_existing: false
  formats:
    - json
    - html
  include_trial_table: true
  include_raw_responses: true

logging:
  level: INFO
  save_log: true
  log_prompts: true
  log_model_responses: true

validation:
  strict_mode: true
  stop_on_error: true
  validate_payload_before_run: true
  validate_cross_file_contracts: true

environment:
  offline: false
  cache_results: true
  working_directory: .

extensions:
  enabled: []
  configuration: {}

metadata:
  owner: ExecutiveAudit
  tags:
    - deepseek
    - theory_of_mind
    - false_belief
    - social_cognition
    - cognitive_experiment
  notes: []
