payload:
  schema: task_payload.v2
  version: '2.0'
experiment:
  id: theory_of_mind_v1
  name: Theory of Mind False Belief Task
  version: '1.0'
  description: Advanced theory of mind experiment testing false belief understanding and mental state attribution in social scenarios. Participants must predict where characters will search for objects based on their false beliefs.
  paradigm: social_cognition
  author:
    name: ExecutiveAudit
  compatibility:
    framework: ExecutiveAudit
    minimum_configuration_schema: experiment_configuration.v2
description: Theory of mind experiment testing false belief understanding and mental state attribution in social scenarios.
author:
  name: ExecutiveAudit
framework:
  min_version: 0.1.0
protocol:
  title: Theory of Mind Experiment
  role: experimental subject
  goal: Predict where characters will search for objects based on their false beliefs.
  rules:
  - Answer ONLY with the location name.
  - Consider what the character believes, not what is true.
  - Do NOT explain your reasoning.
  - Do NOT provide additional context.
  - Produce exactly one answer.
  - Answer ONLY with: LOCATION_A, LOCATION_B, or LOCATION_C
instructions:
  system_role: experimental subject
  task_brief: 'Predict where each character will search for objects based on their false beliefs.'
  task_detail: 'You will read stories about characters who hold false beliefs about object locations. Your task is to predict where each character will search for the object, based on what they believe to be true, not what is actually true.'
  task: 'After reading each story, predict where the character will search for the object. Consider the character\'s beliefs, not reality.'
  stimulus_template:
    character_name: <character name>
    object_name: <object name>
    true_location: <actual location>
    character_belief: <where character believes object is>
    question: <question about character behavior>
  response_format: Return ONLY LOCATION_A, LOCATION_B, or LOCATION_C.
  closing_prompt: Where will the character search for the object?
  display:
    show_field_labels: true
    field_order:
    - character_name
    - object_name
    - true_location
    - character_belief
    - question
    labels:
      character_name: Character
      object_name: Object
      true_location: True Location
      character_belief: Character Belief
      question: Question
  example:
    stimulus:
      character_name: Anna
      object_name: marble
      true_location: Box
      character_belief: Drawer
      question: "Where will Anna look for her marble?"
    expected_response: DRAWER
  examples:
  - id: example_1
    stimulus:
      character_name: Maxi
      object_name: chocolate
      true_location: Kitchen
      character_belief: Cupboard
      question: "Where will Maxi look for his chocolate?"
    expected_response: CUPBOARD
  - id: example_2
    stimulus:
      character_name: Emma
      object_name: teddy bear
      true_location: Bedroom
      character_belief: Living Room
      question: "Where will Emma look for her teddy bear?"
    expected_response: LIVING_ROOM

stimulus_schema:
  id_field: stimulus_id
  fields:
  - name: stimulus_id
    type: integer
    required: true
    display: false
  - name: character_name
    type: string
    required: true
    display: true
    label: Character
  - name: object_name
    type: string
    required: true
    display: true
    label: Object
  - name: true_location
    type: string
    required: true
    display: true
    label: True Location
  - name: character_belief
    type: string
    required: true
    display: true
    label: Character Belief
  - name: question
    type: string
    required: true
    display: true
    label: Question
  - name: correct_response
    type: string
    required: true
    display: false

response_contract:
  extraction:
    mode: last_token
  normalization:
    case: upper
  validation:
    require_exactly_one_answer: true
    allow_explanation: false
    allow_justification: false
    allow_analysis: false
    allow_questions: false
    allow_additional_text: false
  expected_answer:
    source: stimulus_field
    field: correct_response
  accepted_answer_space:
    source: explicit_list
    values:
    - LOCATION_A
    - LOCATION_B
    - LOCATION_C
    - DRAWER
    - BOX
    - CUPBOARD
    - KITCHEN
    - BEDROOM
    - LIVING_ROOM
    - GARDEN
    - GARAGE
    - ATTIC
  aliases:
    LOCATION_A: ["A"]
    LOCATION_B: ["B"]
    LOCATION_C: ["C"]

parser:
  pipeline:
  - extract_answer
  - normalize_answer
  - validate_answer_shape
  stages:
    extract_answer:
      mode: last_token
    normalize_answer:
      case: upper
      strip_punctuation: true
    validate_answer_shape:
      require_exactly_one_answer: true

metrics:
  enabled:
  - accuracy
  - protocol_adherence
  definitions:
    accuracy:
      type: exact_match
      expected_answer_source:
        source: stimulus_field
        field: correct_response
    protocol_adherence:
      type: allowed_response_check
      allowed_response_source:
        source: explicit_list
        values:
        - LOCATION_A
        - LOCATION_B
        - LOCATION_C
        - DRAWER
        - BOX
        - CUPBOARD
        - KITCHEN
        - BEDROOM
        - LIVING_ROOM
        - GARDEN
        - GARAGE
        - ATTIC
      require_single_token: true
  aggregation:
    accuracy_rate:
      from_metric: accuracy
      reducer: mean_boolean
    protocol_adherence_rate:
      from_metric: protocol_adherence
      reducer: mean_boolean
    average_response_time_seconds:
      from_metric: response_time
      reducer: mean

resources:
  inline: {}
  references: []

report_contract:
  trial_fields:
  - stimulus_id
  - character_name
  - object_name
  - true_location
  - character_belief
  - question
  - extracted_answer
  - expected_answer
  - is_correct
  - is_protocol_adherent
  - response_time_seconds
  summary_fields:
  - executed_trials
  - accuracy_rate
  - protocol_adherence_rate
  - average_response_time_seconds

