experiment:
  id: standard_stroop_200_v2
  name: Standard Stroop Task
  version: "2.0"

description: |
  Standard Stroop color-word interference task with a 200-trial dataset.
  The model must report the ink color while ignoring the written word.

author:
  name: ExecutiveAudit

framework:
  min_version: "0.1.0"

protocol:
  title: Experiment Protocol
  role: experimental subject
  goal: Execute the task exactly as instructed.
  rules:
    - Answer ONLY from the provided stimulus.
    - Ignore prior knowledge.
    - Ignore common sense expectations.
    - Do NOT explain.
    - Do NOT justify.
    - Do NOT analyse.
    - Do NOT infer missing information.
    - Do NOT continue the conversation.
    - Do NOT generate additional tasks.
    - Do NOT ask questions.
    - Produce exactly one answer.

instructions:
  task: |
    Name the ink color.
    Ignore the written word.
    Use the numerical RGB foreground values from the stimulus.
  stimulus_template:
    word: "<trial stimulus>"
    foreground_rgb: "<trial stimulus>"
  response_format: Return ONLY the color name that matches the foreground RGB values.
  example:
    stimulus:
      word: RED
      foreground_rgb: "0, 0, 255"
    correct_response: BLUE
  closing_prompt: Now answer using the current stimulus.

response:
  expected: single_token
  extraction_mode: last_token
  normalization: upper
  expected_response:
    source: stimulus_field
    field: ink
  protocol_adherence:
    require_single_token: true
    allowed_stimulus_fields:
      - ink
      - word
  allowed_values:
    - RED
    - BLUE
    - GREEN
    - YELLOW
  allow_explanation: false
  allow_justification: false
  allow_analysis: false
  allow_questions: false
  allow_multiple_answers: false
  allow_additional_text: false
  require_exactly_one_answer: true

model:
  temperature: 0.0
  max_tokens: 10

execution:
  randomize: false
  stop_after: 100

evaluation:
  accuracy:
    enabled: true
  protocol_adherence:
    enabled: true

