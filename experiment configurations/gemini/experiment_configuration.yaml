framework:

  name: ExecutiveAudit

  version: "1.0"

  schema: "experiment.schema.v1"



experiment:

  id: stroop_standard_v1

  name: Standard Stroop Benchmark

  description: >

    Baseline executive-control experiment.

  author: ""

  created: ""



execution:

  repetitions: 20

  random_seed: 42

  timeout_seconds: 60

  parallel_runs: 1

  save_raw_output: true



task:

  package: tasks/stroop_standard



model:

  adapter: google

  model: gemini-2.5-flash

  api_key_env: GEMINI_API_KEY

  base_url: https://generativelanguage.googleapis.com

  temperature: 0.0

  max_tokens: 10



parser:

  name: default



metrics:

  enabled:

    - accuracy

    - response_time

    - omitted_items



report:

  output_directory: reports/

  formats:

    - json

    - html



logging:

  level: INFO

  save_log: true



validation:

  strict_mode: true

  stop_on_error: true



extensions: {}

metadata: {}