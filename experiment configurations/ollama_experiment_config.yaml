framework:
  name: ExecutiveAudit
  configuration_schema: experiment_configuration.v2
  configuration_version: "2.0"
  payload_schema: task_payload.v2
  payload_version: "2.0"

run:
  id: stroop_standard_v1
  label: Standard Stroop Benchmark
  description: Runtime configuration for one experiment execution profile.
  mode: production

experiment_binding:
  payload_file: task_payload.yaml
  expected_experiment_id: standard_stroop_200_v2
  expected_experiment_version: "2.0"
  fail_on_payload_mismatch: true

model:
  adapter: ollama
  model: llama3.2:1b
  api_key_env: null
  base_url: null
  generation:
    temperature: 0.0
    max_tokens: 5
    top_p: null
    stop_sequences: []
  request:
    timeout_seconds: 60
    retry_count: 2
    retry_delay_seconds: 3
    rate_limit: auto

task:
  payload_file: task_payload.yaml

execution:
  repetitions: 20
  random_seed: 42
  timeout_seconds: 60
  parallel_runs: 1
  stop_after_trials: null
  shuffle_trials: false
  fail_fast: true
  save_raw_output: true

report:
  output_directory: reports/
  overwrite_existing: false
  formats:
    - json
    - html
    - txt
  include_trial_table: true
  include_raw_responses: true

logging:
  level: INFO
  save_log: true
  log_prompts: false
  log_model_responses: true

validation:
  strict_mode: true
  stop_on_error: true
  validate_payload_before_run: true
  validate_cross_file_contracts: true

environment:
  offline: false
  cache_results: true
  working_directory: .

extensions:
  enabled: []
  configuration: {}

metadata:
  owner: ExecutiveAudit
  tags:
    - stroop
    - executive-control
    - baseline
  notes: []
