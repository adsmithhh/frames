payload:
  schema: task_payload.v2
  version: '2.0'
experiment:
  id: standard_stroop_200_v2
  name: Standard Stroop Task
  version: '2.0'
  description: 'Standard Stroop color-word interference task with a 200-trial dataset.

    The model must report the ink color while ignoring the written word.'
  paradigm: stroop
  author:
    name: ExecutiveAudit
  compatibility:
    framework: ExecutiveAudit
    minimum_configuration_schema: experiment_configuration.v2
instructions:
  system_role: experimental subject
  task_brief: 'Name the ink color and ignore the written word.

    '
  task_detail: 'Name the ink color.

    Ignore the written word.

    Use the numerical RGB foreground values from the stimulus.

    '
  response_format: Return ONLY the color name that matches the foreground RGB values.
  closing_prompt: Now answer using the current stimulus.
  display:
    show_field_labels: true
    field_order:
    - word
    - foreground_rgb
    labels:
      word: Word
      foreground_rgb: Foreground RGB
      ink: Expected Ink
      foreground_hex: Foreground Hex
  examples:
  - id: example_1
    stimulus:
      word: RED
      foreground_rgb: 0, 0, 255
    expected_response: BLUE
stimulus_schema:
  id_field: stimulus_id
  fields:
  - name: stimulus_id
    type: integer
    required: true
    display: false
    label: Stimulus ID
  - name: word
    type: string
    required: true
    display: true
    label: Word
  - name: foreground_rgb
    type: string
    required: true
    display: true
    label: Foreground RGB
  - name: ink
    type: string
    required: true
    display: false
    label: Expected Ink
  - name: foreground_hex
    type: string
    required: true
    display: false
    label: Foreground Hex
response_contract:
  type: single_token
  extraction:
    mode: last_token
    regex: null
  normalization:
    case: upper
    trim_whitespace: true
    strip_punctuation: true
  validation:
    require_exactly_one_answer: true
    allow_explanation: false
    allow_justification: false
    allow_analysis: false
    allow_questions: false
    allow_additional_text: false
  expected_answer:
    source: stimulus_field
    field: ink
    literal: null
  accepted_answer_space:
    source: explicit_list
    values:
    - RED
    - BLUE
    - GREEN
    - YELLOW
    stimulus_fields:
    - ink
    - word
  aliases: {}
parser:
  pipeline:
  - extract_answer
  - normalize_answer
  - validate_answer_shape
  stages:
    extract_answer:
      mode: last_token
    normalize_answer:
      case: upper
      strip_punctuation: true
    validate_answer_shape:
      require_exactly_one_answer: true
metrics:
  enabled:
  - accuracy
  - protocol_adherence
  - response_time
  definitions:
    accuracy:
      type: exact_match
      expected_answer_source:
        source: stimulus_field
        field: ink
    protocol_adherence:
      type: allowed_response_check
      allowed_response_source:
        source: explicit_list
        values:
        - RED
        - BLUE
        - GREEN
        - YELLOW
        stimulus_fields:
        - ink
        - word
      require_single_token: true
    response_time:
      type: latency
      unit: seconds
  aggregation:
    accuracy_rate:
      from_metric: accuracy
      reducer: mean_boolean
    protocol_adherence_rate:
      from_metric: protocol_adherence
      reducer: mean_boolean
    average_response_time_seconds:
      from_metric: response_time
      reducer: mean
resources:
  inline:
    allowed_values:
    - RED
    - BLUE
    - GREEN
    - YELLOW
  references: []
report_contract:
  trial_fields:
  - stimulus_id
  - word
  - foreground_rgb
  - extracted_answer
  - expected_answer
  - is_correct
  - is_protocol_adherent
  - response_time_seconds
  summary_fields:
  - executed_trials
  - accuracy_rate
  - protocol_adherence_rate
  - average_response_time_seconds
