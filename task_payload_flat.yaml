author:
  name: ExecutiveAudit
description: Visual oddball detection task with 100 trials. Frequent green circles
  are standards and rare blue circles are oddballs.
evaluation:
  accuracy:
    enabled: true
  protocol_adherence:
    enabled: true
execution:
  randomize: false
  stop_after: 100
experiment:
  author:
    name: ExecutiveAudit
  compatibility:
    framework: ExecutiveAudit
    minimum_configuration_schema: experiment_configuration.v2
  description: Visual oddball detection task with 100 trials. Frequent green circles
    are standards and rare blue circles are oddballs.
  id: visual_oddball_100_v1
  name: Visual Oddball Detection Task
  paradigm: oddball
  version: '1.0'
framework:
  min_version: 0.1.0
instructions:
  closing_prompt: Now classify the current stimulus.
  display:
    field_order:
    - shape
    - color
    labels:
      color: Color
      shape: Shape
    show_field_labels: true
  example:
    correct_response: ODDBALL
    stimulus:
      color: BLUE
      shape: CIRCLE
  examples:
  - expected_response: ODDBALL
    id: example_1
    stimulus:
      color: BLUE
      shape: CIRCLE
  response_format: Return ONLY STANDARD or ODDBALL.
  stimulus_template:
    color: <trial stimulus>
    shape: <trial stimulus>
  system_role: experimental subject
  task: 'GREEN CIRCLE is the frequent standard stimulus.

    BLUE CIRCLE is the rare oddball stimulus.

    For each trial, answer whether the current stimulus is STANDARD or ODDBALL.

    '
  task_brief: 'Classify the current stimulus as STANDARD or ODDBALL.

    '
  task_detail: 'GREEN CIRCLE is the frequent standard stimulus.

    BLUE CIRCLE is the rare oddball stimulus.

    For each trial, classify only the current stimulus.

    '
metrics:
  accuracy:
    enabled: true
  protocol_adherence:
    allowed_values:
    - STANDARD
    - ODDBALL
    enabled: true
    require_single_token: true
    stimulus_fields: []
model:
  max_tokens: 5
  temperature: 0.0
parser:
  pipeline:
  - extract_answer
  - normalize_answer
  - validate_answer_shape
  stages:
    extract_answer:
      mode: last_token
    normalize_answer:
      case: upper
      strip_punctuation: true
    validate_answer_shape:
      require_exactly_one_answer: true
protocol:
  goal: Classify each current stimulus as STANDARD or ODDBALL exactly as instructed.
  role: experimental subject
  rules:
  - Answer ONLY with STANDARD or ODDBALL.
  - Treat GREEN CIRCLE as the frequent standard stimulus.
  - Treat BLUE CIRCLE as the rare oddball stimulus.
  - Do NOT explain.
  - Do NOT justify.
  - Do NOT analyse.
  - Do NOT ask questions.
  - Produce exactly one answer.
  title: Experiment Protocol
report_contract:
  summary_fields:
  - executed_trials
  - accuracy_rate
  - protocol_adherence_rate
  - average_response_time_seconds
  trial_fields:
  - stimulus_id
  - shape
  - color
  - extracted_answer
  - expected_answer
  - is_correct
  - is_protocol_adherent
  - response_time_seconds
resources:
  inline:
    allowed_values:
    - STANDARD
    - ODDBALL
  references: []
response:
  allow_additional_text: false
  allow_analysis: false
  allow_explanation: false
  allow_justification: false
  allow_multiple_answers: false
  allow_questions: false
  allowed_values:
  - STANDARD
  - ODDBALL
  expected: single_token
  expected_response:
    field: correct_label
    source: stimulus_field
  extraction_mode: last_token
  normalization: upper
  protocol_adherence:
    require_single_token: true
  require_exactly_one_answer: true
response_contract:
  allow_additional_text: false
  allow_analysis: false
  allow_explanation: false
  allow_justification: false
  allow_multiple_answers: false
  allow_questions: false
  allowed_values:
  - STANDARD
  - ODDBALL
  expected: single_token
  expected_response:
    field: correct_label
    source: stimulus_field
  extraction_mode: last_token
  normalization: upper
  require_exactly_one_answer: true
schema: task_payload.v2
