payload:
  schema: task_payload.v2
  version: '2.0'
experiment:
  id: ascii_geometric_oddball_v1
  name: ASCII Geometric Oddball Detection Task
  version: '1.2'
  description: Visual oddball detection task with 100 trials using randomly-assigned
    Unicode geometric shapes. Standard trials show one of ⬢ ▲ ■ (randomly chosen);
    oddball trials show one of ⬟ ★ (randomly chosen).
  paradigm: oddball
  author:
    name: ExecutiveAudit
  compatibility:
    framework: ExecutiveAudit
    minimum_configuration_schema: experiment_configuration.v2
description: Visual oddball detection task with 100 trials using randomly-assigned
  Unicode geometric shapes. Standard trials show one of ⬢ ▲ ■ (randomly chosen); oddball
  trials show one of ⬟ ★ (randomly chosen).
author:
  name: ExecutiveAudit
framework:
  min_version: 0.1.0
protocol:
  title: Experiment Protocol
  role: experimental subject
  goal: Classify each current geometric shape as STANDARD or ODDBALL exactly as instructed.
  rules:
  - Answer ONLY with STANDARD or ODDBALL.
  - 'Treat any of these shapes as STANDARD: ⬢ ▲ ■'
  - 'Treat any of these shapes as ODDBALL: ⬟ ★'
  - Do NOT explain.
  - Do NOT justify.
  - Do NOT analyse.
  - Do NOT ask questions.
  - Produce exactly one answer.
instructions:
  system_role: experimental subject
  task_brief: Classify the current geometric shape as STANDARD or ODDBALL.
  task_detail: Standard shapes (⬢ ▲ ■) appear frequently. Oddball shapes (⬟ ★) appear
    rarely. For each trial, classify only the current shape.
  task: Standard shapes (⬢ ▲ ■) are frequent. Oddball shapes (⬟ ★) are rare. For each
    trial, answer whether the current shape is STANDARD or ODDBALL.
  stimulus_template:
    geometric_shape: <geometric shape>
    color: <color name>
    rgb_color: <RGB color code>
  response_format: Return ONLY STANDARD or ODDBALL.
  closing_prompt: Now classify the current geometric shape.
  display:
    show_field_labels: true
    field_order:
    - geometric_shape
    - color
    - rgb_color
    labels:
      geometric_shape: Shape
      color: Color Name
      rgb_color: RGB Code
  example:
    stimulus:
      geometric_shape: ⬟
      color: RED
      rgb_color: '#FF0000'
    correct_response: ODDBALL
  examples:
  - id: example_1
    stimulus:
      geometric_shape: ⬟
      color: RED
      rgb_color: '#FF0000'
    expected_response: ODDBALL
stimulus_schema:
  id_field: stimulus_id
  fields:
  - name: stimulus_id
    type: integer
    required: true
    display: false
  - name: geometric_shape
    type: string
    required: true
    display: true
    label: Shape
  - name: color
    type: string
    required: true
    display: true
    label: Color Name
  - name: rgb_color
    type: string
    required: true
    display: true
    label: RGB Code
  - name: correct_label
    type: string
    required: true
    display: false
response_contract:
  extraction:
    mode: last_token
  normalization:
    case: upper
  validation:
    require_exactly_one_answer: true
    allow_explanation: false
    allow_justification: false
    allow_analysis: false
    allow_questions: false
    allow_additional_text: false
  expected_answer:
    source: stimulus_field
    field: correct_label
  accepted_answer_space:
    source: explicit_list
    values:
    - STANDARD
    - ODDBALL
  aliases:
    STANDARD: []
    ODDBALL: []
parser:
  pipeline:
  - extract_answer
  - normalize_answer
  - validate_answer_shape
  stages:
    extract_answer:
      mode: last_token
    normalize_answer:
      case: upper
      strip_punctuation: true
    validate_answer_shape:
      require_exactly_one_answer: true
metrics:
  enabled:
  - accuracy
  - protocol_adherence
  definitions:
    accuracy:
      type: exact_match
      expected_answer_source:
        source: stimulus_field
        field: correct_label
    protocol_adherence:
      type: allowed_response_check
      allowed_response_source:
        source: explicit_list
        values:
        - STANDARD
        - ODDBALL
      require_single_token: true
  aggregation:
    accuracy_rate:
      from_metric: accuracy
      reducer: mean_boolean
    protocol_adherence_rate:
      from_metric: protocol_adherence
      reducer: mean_boolean
    average_response_time_seconds:
      from_metric: response_time
      reducer: mean
resources:
  inline: {}
  references: []
report_contract:
  trial_fields:
  - stimulus_id
  - geometric_shape
  - color
  - rgb_color
  - extracted_answer
  - expected_answer
  - is_correct
  - is_protocol_adherent
  - response_time_seconds
  summary_fields:
  - executed_trials
  - accuracy_rate
  - protocol_adherence_rate
  - average_response_time_seconds
