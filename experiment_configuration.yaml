framework:
  name: ExecutiveAudit
  configuration_schema: experiment_configuration.v2
  configuration_version: "2.0"
  payload_schema: task_payload.v2
  payload_version: "2.0"

run:
  id: payload-driven-run
  label: Payload-Driven Experiment Run
  description: >
    Neutral DeepSeek runtime configuration intended to derive experiment
    semantics from task_payload.yaml.
  mode: production

experiment_binding:
  payload_file: task_payload.yaml
  fail_on_payload_mismatch: false

task:
  payload_file: task_payload.yaml

engines:
  - label: "DeepSeek (deepseek-chat)"
    adapter: deepseek
    model: deepseek-chat
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
  - label: "Anthropic (claude-haiku-4-5)"
    adapter: anthropic
    model: claude-haiku-4-5-20251001
    api_key_env: ANTHROPIC_API_KEY
    base_url: null
  - label: "OpenAI (gpt-5.4-mini)"
    adapter: openai
    model: gpt-5.4-mini
    api_key_env: OPENAI_API_KEY
    base_url: null
  - label: "Gemini (gemini-2.5-flash)"
    adapter: google
    model: gemini-2.5-flash
    api_key_env: GEMINI_API_KEY
    base_url: null
  - label: "Ollama phi3.5 (local, no key needed)"
    adapter: ollama
    model: phi3.5:latest
    api_key_env: null
    base_url: http://localhost:11434

model:
  adapter: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY
  base_url: https://api.deepseek.com
  generation:
    temperature: 0.0
    max_tokens: 5
    top_p: null
    stop_sequences: []
  request:
    timeout_seconds: 60
    retry_count: 2
    retry_delay_seconds: 3
    rate_limit: auto

execution:
  repetitions: 20
  random_seed: 42
  timeout_seconds: 60
  parallel_runs: 1
  stop_after_trials: null
  shuffle_trials: false
  fail_fast: true
  save_raw_output: true

report:
  output_directory: reports/
  overwrite_existing: false
  formats:
    - json
    - html
  include_trial_table: true
  include_raw_responses: true

logging:
  level: INFO
  save_log: true
  log_prompts: false
  log_model_responses: true

validation:
  strict_mode: true
  stop_on_error: true
  validate_payload_before_run: true
  validate_cross_file_contracts: true

environment:
  offline: false
  cache_results: true
  working_directory: .

extensions:
  enabled: []
  configuration: {}

metadata:
  owner: ExecutiveAudit
  tags:
    - payload-driven
    - deepseek
    - generic-runtime
  notes: []
